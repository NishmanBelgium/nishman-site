<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Nishman — NBD Distribution Belgium</title>
  <meta name="description" content="Nishman — NBD Distribution Belgium. Site officiel bientôt disponible." />
  <meta name="theme-color" content="#0c0a08" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" type="image/svg+xml" href="/assets/img/favicon.svg" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <main class="card">
    <img class="logo" src="/assets/img/logo.png" alt="Nishman — Creative Men Design" />
    <p class="eyebrow">NBD Distribution Belgium</p>

    <div class="badge-wrap">
      <span class="badge">Site officiel — arrive bientôt</span>
    </div>

    <h1 class="home-title">Notre nouveau site<br />arrive très prochainement</h1>
    <p class="home-text">
      En attendant, contactez directement l'un de nos conseillers commerciaux
      ci-dessous — ils répondent en direct sur WhatsApp.
    </p>

    <hr class="hairline" />

    <p class="section-label">Nos conseillers commerciaux</p>
    <ul class="label-list" id="home-agent-list"></ul>

    <p class="footer-note">&copy; <span id="year"></span> Nishman</p>
  </main>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/home.js"></script>
  <script>document.getElementById("year").textContent = new Date().getFullYear();</script>
</body>
</html>
